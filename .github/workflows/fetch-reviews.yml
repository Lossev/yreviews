name: Fetch Yandex Reviews

on:
  schedule:
    - cron: '0 0-7 * * *'
    - cron: '0,36 8-23 * * *'
  workflow_dispatch:
    inputs:
      org_id:
        description: 'Organization ID'
        required: false
        default: '58302385598'

jobs:
  fetch-reviews:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth
      
      - name: Fetch reviews with Xvfb
        run: |
          sudo apt-get install -y xvfb
          xvfb-run -a node yreviews-gh.js "${{ github.event.inputs.org_id || '58302385598' }}"
      
      - name: Commit changes
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git pull origin main --rebase || true
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Update reviews - $(date '+%Y-%m-%d %H:%M')"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
